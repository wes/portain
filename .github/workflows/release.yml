name: Release

# Tag a commit with v1.2.3 and push the tag to build a universal .app,
# package a .dmg + .zip, and publish them as a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build & package
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          bash scripts/release.sh "$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            "dist/Portain-$VERSION.dmg" \
            "dist/Portain-$VERSION.zip" \
            "dist/SHA256SUMS.txt" \
            --title "Portain $VERSION" \
            --generate-notes

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Portain-${{ env.VERSION }}
          path: dist/*
